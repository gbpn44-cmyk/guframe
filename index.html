<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindle Frame</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: white;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}
</style>
</head>

<body>

<img id="slide" src="images/foto1.jpg">

<script>
const images = [
    "images/foto1.jpg",
    "images/foto2.jpg",
    "images/foto3.jpg"
];

let index = 0;

setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("slide").src = images[index];
}, 120000);
</script>

</body>
</html>
