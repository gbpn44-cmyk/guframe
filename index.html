<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Museo del 1996</title>

<meta http-equiv="refresh" content="90">

<style>

html, body {
    margin: 0;
    padding: 0;
    background: #f5f1e8;
    overflow: hidden;
    width: 100%;
    height: 100%;
}

#container {
    width: 100%;
    height: 100%;
    text-align: center;
}

#photo {
    max-width: 100%;
    max-height: 88%;
    margin-top: 10px;
}

#caption {
    font-family: Georgia, serif;
    color: #222;
    font-size: 18px;
    margin-top: 8px;
}

#subcaption {
    font-family: Georgia, serif;
    color: #666;
    font-size: 12px;
    margin-top: 4px;
}

</style>
</head>

<body>

<div id="container">

    <img id="photo" src="foto1.jpg">

    <div id="caption">
        Museo del 1996
    </div>

    <div id="subcaption">
        Archivio fotografico
    </div>

</div>

<script>

// VERSIONE ULTRA COMPATIBILE KINDLE

var images = [
    "foto1.jpg",
    "foto2.jpg",
    "foto3.jpg"
];

var current = 0;

function changePhoto() {

    current++;

    if(current >= images.length) {
        current = 0;
    }

    document.getElementById("photo").src =
        images[current] + "?t=" + new Date().getTime();
}

// cambia foto ogni 2 minuti
setInterval(changePhoto, 120000);

</script>

</body>
</html>
